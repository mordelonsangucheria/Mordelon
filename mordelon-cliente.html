<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mordelón — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --turquesa: #3DBFB8;
  --turquesa-dark: #2A9E98;
  --negro: #111;
  --gris-dark: #1C1C1C;
  --gris-mid: #262626;
  --gris-light: #363636;
  --blanco: #F4F9F8;
  --naranja: #D4831A;
  --rojo: #FF4D4D;
  --verde: #2DC653;
}

/* MODO CLARO */
body.light {
  --negro: #F0F0F0;
  --gris-dark: #FFFFFF;
  --gris-mid: #F5F5F5;
  --gris-light: #DDDDDD;
  --blanco: #111111;
  --naranja: #C07010;
}
body.light header {
  box-shadow: 0 2px 20px rgba(0,0,0,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Nunito',sans-serif; background:var(--negro); color:var(--blanco); overflow-x:hidden; transition:background .3s, color .3s; }

/* SPLASH */
.splash {
  position:fixed; top:0; left:0; width:100%; height:100%; background:var(--negro);
  display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;
}
.splash-logo { width:120px; animation:bounceSplash 1.5s infinite; }
@keyframes bounceSplash { 0%,100% {transform:scale(1);} 50% {transform:scale(1.15);} }

header {
  background:var(--gris-dark); border-bottom:2px solid var(--turquesa);
  padding:10px 16px; text-align:center; position:sticky; top:0; z-index:100;
  box-shadow:0 2px 20px rgba(61,191,184,0.2);
}
header img { height:50px; filter:drop-shadow(0 0 8px rgba(61,191,184,0.4)); }
header p { font-size:0.65rem; color:#888; letter-spacing:3px; text-transform:uppercase; margin-top:2px; }

.screen { display:none; padding:16px; padding-bottom:120px; max-width:480px; margin:0 auto; animation:fadeIn .3s; }
.screen.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

/* CATEGORÍAS */
.cat-label {
  font-family:'Righteous',cursive; font-size:0.9rem; color:var(--turquesa);
  letter-spacing:3px; margin:18px 0 10px; text-transform:uppercase;
  display:flex; align-items:center; gap:8px;
}
.cat-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--turquesa),transparent); opacity:.25; }

.items-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.item-card {
  background:var(--gris-dark); border:1.5px solid var(--gris-light);
  border-radius:14px; padding:13px 11px 36px; cursor:pointer;
  transition:all .2s; position:relative; overflow:hidden;
}
.item-card:active { transform:scale(.97); border-color:var(--turquesa); }
.item-emoji { font-size:2rem; display:block; margin-bottom:5px; }
.item-nombre { font-weight:900; font-size:0.82rem; line-height:1.25; margin-bottom:3px; }
.item-desc { font-size:0.65rem; color:#777; line-height:1.3; margin-bottom:5px; }
.item-precio { font-weight:900; color:var(--turquesa); font-size:0.9rem; }
.add-pill {
  position:absolute; bottom:8px; right:8px;
  background:var(--turquesa); color:var(--negro);
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; font-weight:900;
}
.combo-tag {
  display:inline-block; background:var(--naranja); color:white;
  font-size:0.58rem; font-weight:900; padding:1px 6px; border-radius:4px;
  text-transform:uppercase; margin-bottom:3px;
}

/* NAVBAR */
.navbar {
  position:fixed; bottom:0; left:0; width:100%;
  background:rgba(28,28,28,0.95); backdrop-filter:blur(10px);
  border-top:1px solid var(--gris-light);
  display:flex; justify-content:space-around; padding:10px 0; z-index:99;
}
.nav-btn {
  background:none; border:none; color:#666; font-size:0.6rem;
  text-transform:uppercase; font-weight:800; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:4px; transition:.2s;
}
.nav-btn.active { color:var(--turquesa); }
.nav-btn i { font-size:1.3rem; }

/* CARRITO */
.cart-bar {
  position:fixed; bottom:70px; left:16px; right:16px;
  background:var(--turquesa); color:var(--negro);
  padding:14px 20px; border-radius:14px;
  display:none; align-items:center; justify-content:space-between;
  box-shadow:0 8px 30px rgba(61,191,184,0.4); z-index:98;
  cursor:pointer; transform:translateY(100px); transition:transform .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.cart-bar.visible { display:flex; transform:translateY(0); }
.cart-info { font-weight:900; font-size:0.9rem; }
.cart-btn { font-weight:900; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; }

/* BOTONES */
.btn {
  display:block; width:100%; padding:15px; border:none; border-radius:12px;
  font-size:0.9rem; font-weight:900; cursor:pointer; margin:10px 0;
  text-transform:uppercase; letter-spacing:1px; transition:transform .1s;
}
.btn:active { transform:scale(.98); }
.btn-turquesa { background:var(--turquesa); color:var(--negro); }
.btn-gris { background:var(--gris-light); color:var(--blanco); }

/* FORMS */
.input-group { margin-bottom:15px; }
.input-group label { display:block; font-size:0.7rem; color:#888; margin-bottom:5px; text-transform:uppercase; font-weight:800; }
.input-group input, .input-group select, .input-group textarea {
  width:100%; padding:12px; background:var(--gris-mid); border:1.5px solid var(--gris-light);
  border-radius:10px; color:var(--blanco); font-size:0.9rem; outline:none;
}
.input-group input:focus { border-color:var(--turquesa); }

/* RESUMEN PEDIDO */
.summary-card { background:var(--gris-dark); border-radius:14px; padding:15px; margin-bottom:15px; border:1px solid var(--gris-light); }
.summary-item { display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.85rem; }
.summary-total { border-top:1px solid var(--gris-light); padding-top:10px; margin-top:10px; font-weight:900; font-size:1.1rem; color:var(--turquesa); }

/* SLOTS (JACKPOT) */
.slot-container {
  background:linear-gradient(135deg,#1c1c1c,#111);
  border:2px solid var(--gris-light); border-radius:20px;
  padding:20px; margin:15px 0; text-align:center; position:relative; overflow:hidden;
}
.slot-machine { display:flex; justify-content:center; gap:8px; margin-bottom:20px; }
.slot-cell {
  width:72px; height:92px; background:var(--negro); border:1.5px solid #333;
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  font-size:2.8rem; transition:border-color .2s, box-shadow .2s;
}
.slot-cell.win-jackpot { border-color:#FFD700; box-shadow:0 0 18px rgba(255,215,0,0.7); animation:jackpotPulse .4s infinite alternate; }
@keyframes jackpotPulse { from{transform:scale(1)} to{transform:scale(1.08)} }

/* DINO GAME MINI */
#dinoContainer { width:100%; height:150px; background:#222; border-radius:12px; position:relative; overflow:hidden; margin-top:15px; display:none; }
#dinoCanvas { width:100%; height:100%; }

/* MODAL */
.modal-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8);
  display:none; align-items:center; justify-content:center; z-index:1000; padding:20px;
}
.modal-content {
  background:var(--gris-dark); border-radius:20px; padding:25px; width:100%; max-width:400px;
  text-align:center; border:2px solid var(--turquesa);
}
</style>
</head>
<body class="dark">

<div class="splash" id="splash">
  <img src="https://i.ibb.co/3mS0H1K/logo-mordelon.png" class="splash-logo" alt="Logo">
</div>

<header>
  <img src="https://i.ibb.co/3mS0H1K/logo-mordelon.png" alt="Mordelón">
  <p>Sabor que muerde</p>
</header>

<div id="screen-menu" class="screen active">
  <div class="cat-label">🍔 Hamburguesas</div>
  <div class="items-grid" id="grid-burgers"></div>

  <div class="cat-label">🍟 Para Picar</div>
  <div class="items-grid" id="grid-sides"></div>

  <div class="cat-label">🥤 Bebidas</div>
  <div class="items-grid" id="grid-drinks"></div>
</div>

<div id="screen-jackpot" class="screen">
  <div class="cat-label">🎰 Jackpot Mordelón</div>
  <p style="font-size:0.75rem; color:#888; margin-bottom:15px;">¡Gira y gana descuentos exclusivos para tu pedido!</p>
  
  <div class="slot-container">
    <div class="slot-machine">
      <div id="s1" class="slot-cell">🍔</div>
      <div id="s2" class="slot-cell">🍔</div>
      <div id="s3" class="slot-cell">🍔</div>
    </div>
    <button class="btn btn-turquesa" id="spinBtn" onclick="jugarJackpot()">¡Girar ahora!</button>
    <p id="jackpot-msg" style="margin-top:15px; font-weight:800; color:var(--turquesa); min-height:1.2em;"></p>
  </div>

  <div id="dinoContainer">
    <canvas id="dinoCanvas"></canvas>
    <div style="position:absolute; top:5px; right:10px; font-size:10px; color:#fff;">Dino Mordelón</div>
  </div>
</div>

<div id="screen-cart" class="screen">
  <div class="cat-label">🛒 Tu Pedido</div>
  <div id="cart-list"></div>
  
  <div class="summary-card" id="cart-summary" style="display:none;">
    <div class="summary-item"><span>Subtotal:</span><span id="sum-subtotal">$0</span></div>
    <div class="summary-item" id="row-discount" style="display:none; color:var(--verde);"><span>Descuento Jackpot:</span><span id="sum-discount">-$0</span></div>
    <div class="summary-total"><span>Total:</span><span id="sum-total">$0</span></div>
  </div>

  <div id="cart-empty" style="text-align:center; padding:40px 0;">
    <span style="font-size:3rem; opacity:0.3;">🛍️</span>
    <p style="color:#666; margin-top:10px;">Tu carrito está vacío</p>
    <button class="btn btn-turquesa" style="width:auto; display:inline-block; padding:10px 25px; margin-top:15px;" onclick="switchTab('menu')">Ir al Menú</button>
  </div>

  <div id="checkout-form" style="display:none; margin-top:20px;">
    <div class="input-group">
      <label>Tu Nombre</label>
      <input type="text" id="order-name" placeholder="Ej: Juan Pérez">
    </div>
    <div class="input-group">
      <label>¿Cómo recibes?</label>
      <select id="order-type" onchange="toggleEnvio()">
        <option value="envio">Envío a domicilio</option>
        <option value="retiro">Retiro por local</option>
      </select>
    </div>
    <div id="envio-fields">
      <div class="input-group">
        <label>Dirección</label>
        <input type="text" id="order-address" placeholder="Ej: Av. Principal 123">
      </div>
    </div>
    <div class="input-group">
      <label>Método de Pago</label>
      <select id="order-payment">
        <option value="Transferencia">Transferencia (Datos al final)</option>
        <option value="Efectivo">Efectivo</option>
        <option value="Mercado Pago">Mercado Pago</option>
      </select>
    </div>
    <button class="btn btn-turquesa" onclick="enviarPedido()">Confirmar Pedido vía WhatsApp</button>
  </div>
</div>

<div class="navbar">
  <button class="nav-btn active" onclick="switchTab('menu')" id="nav-menu">
    <i>🍔</i><span>Menú</span>
  </button>
  <button class="nav-btn" onclick="switchTab('jackpot')" id="nav-jackpot">
    <i>🎰</i><span>Jackpot</span>
  </button>
  <button class="nav-btn" onclick="switchTab('cart')" id="nav-cart">
    <i>🛒</i><span>Pedido</span>
  </button>
</div>

<div class="cart-bar" id="floating-cart" onclick="switchTab('cart')">
  <div class="cart-info"><span id="float-qty">0</span> ítems — <span id="float-total">$0</span></div>
  <div class="cart-btn">Ver Pedido</div>
</div>

<script>
const MENU = {
  burgers: [
    { id:1, name:'Clásica Mordelón', price:8500, emoji:'🍔', desc:'Carne 180g, cheddar, lechuga, tomate y salsa secreta.' },
    { id:2, name:'La Doble Queso', price:9800, emoji:'🧀', desc:'Doble carne, 4 fetas de cheddar y cebolla caramelizada.' },
    { id:3, name:'Mordelón Bacon', price:10500, emoji:'🥓', desc:'Bacon crocante, huevo frito y barbacoa casera.' },
    { id:4, name:'Combo Amigos (2)', price:18000, emoji:'🔥', desc:'2 Clásicas + Papas grandes.', combo:true }
  ],
  sides: [
    { id:10, name:'Papas Fritas', price:3500, emoji:'🍟', desc:'Porción individual de papas bastón.' },
    { id:11, name:'Nuggets x8', price:4200, emoji:'🍗', desc:'Pechuga de pollo con dip de mostaza y miel.' }
  ],
  drinks: [
    { id:20, name:'Gaseosa 500ml', price:1800, emoji:'🥤', desc:'Línea Coca-Cola.' },
    { id:21, name:'Cerveza Lata', price:2500, emoji:'🍺', desc:'Consultar variedades disponibles.' }
  ]
};

let CART = [];
let DISCOUNT = 0;
let JACKPOT_PLAYED = false;

// INICIALIZACIÓN
window.onload = () => {
  renderMenu();
  setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
  }, 1500);
};

function renderMenu() {
  const renderList = (data, containerId) => {
    const container = document.getElementById(containerId);
    container.innerHTML = data.map(item => `
      <div class="item-card" onclick="addToCart(${item.id}, '${item.name}', ${item.price})">
        ${item.combo ? '<span class="combo-tag">Combo</span>' : ''}
        <span class="item-emoji">${item.emoji}</span>
        <div class="item-nombre">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-precio">$${item.price.toLocaleString()}</div>
        <div class="add-pill">+</div>
      </div>
    `).join('');
  };
  renderList(MENU.burgers, 'grid-burgers');
  renderList(MENU.sides, 'grid-sides');
  renderList(MENU.drinks, 'grid-drinks');
}

function switchTab(tabId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tabId).classList.add('active');
  document.getElementById('nav-' + tabId).classList.add('active');
  window.scrollTo(0,0);
}

function addToCart(id, name, price) {
  const existing = CART.find(item => item.id === id);
  if(existing) existing.qty++;
  else CART.push({ id, name, price, qty: 1 });
  updateCartUI();
}

function removeFromCart(id) {
  const idx = CART.findIndex(item => item.id === id);
  if(idx > -1) {
    CART[idx].qty--;
    if(CART[idx].qty <= 0) CART.splice(idx, 1);
  }
  updateCartUI();
}

function updateCartUI() {
  const list = document.getElementById('cart-list');
  const float = document.getElementById('floating-cart');
  
  if(CART.length === 0) {
    list.innerHTML = '';
    document.getElementById('cart-empty').style.display = 'block';
    document.getElementById('cart-summary').style.display = 'none';
    document.getElementById('checkout-form').style.display = 'none';
    float.classList.remove('visible');
    return;
  }

  document.getElementById('cart-empty').style.display = 'none';
  document.getElementById('cart-summary').style.display = 'block';
  document.getElementById('checkout-form').style.display = 'block';
  float.classList.add('visible');

  let subtotal = 0;
  let totalQty = 0;

  list.innerHTML = CART.map(item => {
    subtotal += (item.price * item.qty);
    totalQty += item.qty;
    return `
      <div class="summary-card" style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div style="font-weight:800; font-size:0.9rem;">${item.name}</div>
          <div style="color:var(--turquesa); font-weight:700;">$${(item.price * item.qty).toLocaleString()}</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <button onclick="removeFromCart(${item.id})" style="background:#444; color:white; border:none; width:25px; height:25px; border-radius:50%; font-weight:900;">-</button>
          <span style="font-weight:900;">${item.qty}</span>
          <button onclick="addToCart(${item.id}, '${item.name}', ${item.price})" style="background:var(--turquesa); color:var(--negro); border:none; width:25px; height:25px; border-radius:50%; font-weight:900;">+</button>
        </div>
      </div>
    `;
  }).join('');

  let discountVal = (subtotal * DISCOUNT) / 100;
  let finalTotal = subtotal - discountVal;

  document.getElementById('float-qty').innerText = totalQty;
  document.getElementById('float-total').innerText = '$' + finalTotal.toLocaleString();
  document.getElementById('sum-subtotal').innerText = '$' + subtotal.toLocaleString();
  
  if(DISCOUNT > 0) {
    document.getElementById('row-discount').style.display = 'flex';
    document.getElementById('sum-discount').innerText = '-$' + discountVal.toLocaleString() + ' ('+DISCOUNT+'%)';
  }
  
  document.getElementById('sum-total').innerText = '$' + finalTotal.toLocaleString();
}

function toggleEnvio() {
  const type = document.getElementById('order-type').value;
  document.getElementById('envio-fields').style.display = type === 'envio' ? 'block' : 'none';
}

// 🎰 JACKPOT LOGIC
const icons = ['🍔', '🍟', '🥤', '🍕', '🥓', '🍋', '🍐'];
function jugarJackpot() {
  if(JACKPOT_PLAYED) return alert("Ya participaste en el Jackpot de hoy.");
  
  const btn = document.getElementById('spinBtn');
  const msg = document.getElementById('jackpot-msg');
  btn.disabled = true;
  msg.innerText = "¡Girando!";

  document.querySelectorAll('.slot-cell').forEach(c => c.classList.remove('win-jackpot'));

  let laps = 0;
  const timer = setInterval(() => {
    const res = [
      icons[Math.floor(Math.random() * icons.length)],
      icons[Math.floor(Math.random() * icons.length)],
      icons[Math.floor(Math.random() * icons.length)]
    ];
    
    document.getElementById('s1').innerText = res[0];
    document.getElementById('s2').innerText = res[1];
    document.getElementById('s3').innerText = res[2];
    
    laps++;
    if(laps > 20) {
      clearInterval(timer);
      btn.style.display = 'none';
      JACKPOT_PLAYED = true;

      // --- AQUÍ ESTÁ LA LÓGICA CORREGIDA ---
      // Verificamos que el 1er rodillo sea igual al 2do Y el 2do sea igual al 3ero
      if(res[0] === res[1] && res[1] === res[2]) {
        document.querySelectorAll('.slot-cell').forEach(c => c.classList.add('win-jackpot'));
        DISCOUNT = 25;
        msg.innerText = "🎉 ¡JACKPOT! Ganaste 25% de descuento.";
        msg.style.color = "var(--verde)";
        updateCartUI();
      } else {
        msg.innerText = "No hubo suerte. ¡Igual puedes disfrutar de tu Mordelón!";
        msg.style.color = "#888";
        // Si pierde, activamos el dino game como consuelo
        document.getElementById('dinoContainer').style.display = 'block';
        initDino();
      }
    }
  }, 100);
}

// ENVÍO WHATSAPP
function enviarPedido() {
  const name = document.getElementById('order-name').value;
  const type = document.getElementById('order-type').value;
  const address = document.getElementById('order-address').value;
  const payment = document.getElementById('order-payment').value;

  if(!name) return alert("Por favor ingresa tu nombre");
  if(type === 'envio' && !address) return alert("Por favor ingresa tu dirección");

  let text = `*NUEVO PEDIDO - MORDELÓN*%0A---------------------------%0A`;
  text += `*Cliente:* ${name}%0A`;
  text += `*Tipo:* ${type === 'envio' ? 'Envío a domicilio' : 'Retiro por local'}%0A`;
  if(type === 'envio') text += `*Dirección:* ${address}%0A`;
  text += `*Pago:* ${payment}%0A---------------------------%0A`;
  
  CART.forEach(item => {
    text += `• ${item.qty}x ${item.name} ($${(item.price * item.qty).toLocaleString()})%0A`;
  });

  const subtotal = CART.reduce((acc, i) => acc + (i.price * i.qty), 0);
  if(DISCOUNT > 0) {
    text += `---------------------------%0A*Descuento Jackpot:* ${DISCOUNT}%25%0A`;
  }
  
  const total = subtotal - (subtotal * DISCOUNT / 100);
  text += `*TOTAL A PAGAR: $${total.toLocaleString()}*%0A---------------------------`;

  window.open(`https://wa.me/5491122334455?text=${text}`, '_blank');
}

// MINI DINO GAME (Simple Canvas)
function initDino() {
  const canvas = document.getElementById('dinoCanvas');
  const ctx = canvas.getContext('2d');
  let x = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#3DBFB8";
    ctx.fillRect(20, 110, 20, 20); // El "dino"
    ctx.fillStyle = "#fff";
    ctx.fillText("¡Próximamente: Juego por premios!", 50, 80);
    requestAnimationFrame(draw);
  }
  draw();
}
</script>

</body>
</html>
