<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mordelón — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --turquesa: #3DBFB8;
  --turquesa-dark: #2A9E98;
  --negro: #111;
  --gris-dark: #1C1C1C;
  --gris-mid: #262626;
  --gris-light: #363636;
  --blanco: #F4F9F8;
  --naranja: #D4831A;
  --rojo: #FF4D4D;
  --verde: #2DC653;
}

/* MODO CLARO */
body.light {
  --negro: #F0F0F0;
  --gris-dark: #FFFFFF;
  --gris-mid: #F5F5F5;
  --gris-light: #DDDDDD;
  --blanco: #111111;
  --naranja: #C07010;
}
body.light header {
  box-shadow: 0 2px 20px rgba(0,0,0,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:var(--negro); color:var(--blanco); min-height:100vh; }

header {
  background:var(--gris-dark); border-bottom:2px solid var(--turquesa);
  padding:10px 16px; text-align:center; position:sticky; top:0; z-index:100;
  box-shadow:0 2px 20px rgba(61,191,184,0.2);
}
header img { height:50px; filter:drop-shadow(0 0 8px rgba(61,191,184,0.4)); }
header p { font-size:0.65rem; color:#888; letter-spacing:3px; text-transform:uppercase; margin-top:2px; }

/* PANTALLAS */
.screen { display:none; padding:16px; max-width:480px; margin:0 auto; }
.screen.active { display:block; }

/* MENÚ */
.cat-label {
  font-family:'Righteous',cursive; font-size:0.9rem; color:var(--turquesa);
  letter-spacing:3px; margin:18px 0 10px; text-transform:uppercase;
  display:flex; align-items:center; gap:8px;
}
.cat-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--turquesa),transparent); opacity:.25; }

.items-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.item-card {
  background:var(--gris-dark); border:1.5px solid var(--gris-light);
  border-radius:14px; padding:13px 11px 36px; cursor:pointer;
  transition:all .2s; position:relative; overflow:hidden;
}
.item-card:active { transform:scale(.97); border-color:var(--turquesa); }
.item-emoji { font-size:2rem; display:block; margin-bottom:5px; }
.item-nombre { font-weight:900; font-size:0.82rem; line-height:1.25; margin-bottom:3px; }
.item-desc { font-size:0.65rem; color:#777; line-height:1.3; margin-bottom:5px; }
.item-precio { font-weight:900; color:var(--turquesa); font-size:0.9rem; }
.add-pill {
  position:absolute; bottom:8px; right:8px;
  background:var(--turquesa); color:var(--negro);
  width:26px; height:26px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; font-weight:900;
}
.combo-tag {
  display:inline-block; background:var(--naranja); color:white;
  font-size:0.58rem; font-weight:900; padding:1px 6px; border-radius:4px;
  text-transform:uppercase; margin-bottom:3px;
}

/* ── SLOTS v2 ── */
.slot-cell {
  width:72px;height:52px;background:var(--gris-dark);border:1.5px solid #333;
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;transition:border-color .2s,box-shadow .2s,transform .1s;
  position:relative;z-index:0;
}
.slot-cell.slot-center { background:#111; }
.slot-cell.win-line { border-color:var(--naranja);box-shadow:0 0 10px rgba(255,140,0,.5); }
.slot-cell.win-jackpot { border-color:#FFD700;box-shadow:0 0 18px rgba(255,215,0,.7);animation:jackpotPulse .4s ease-in-out infinite alternate; }
.slot-cell.win-mega { border-color:#FF4D4D;box-shadow:0 0 22px rgba(255,77,77,.8);animation:jackpotPulse .3s ease-in-out infinite alternate; }
@keyframes jackpotPulse { from{transform:scale(1)} to{transform:scale(1.08)} }

</style>
</head>
<body>

<header>
  <img src="logo_mordelon.png" alt="Logo">
  <p>Sabor que muerde</p>
</header>

<div class="screen active">
    <div class="cat-label">🎰 Jackpot Mordelón</div>
    <div style="display:flex; gap:10px; justify-content:center; padding:20px;">
        <div id="s1" class="slot-cell">🍔</div>
        <div id="s2" class="slot-cell slot-center">🍔</div>
        <div id="s3" class="slot-cell">🍔</div>
    </div>
    <button class="btn btn-turquesa" id="spinBtn" onclick="jugarJackpot()">GIRAR JACKPOT</button>
</div>

<script>
const iconos = ['🍔', '🍕', '🍟', '🍋', '🍐'];

function jugarJackpot() {
    const btn = document.getElementById('spinBtn');
    btn.disabled = true;
    
    // Limpiar clases de victoria anteriores
    document.querySelectorAll('.slot-cell').forEach(c => {
        c.classList.remove('win-jackpot', 'win-line');
    });

    let count = 0;
    const interval = setInterval(() => {
        const res = [
            iconos[Math.floor(Math.random() * iconos.length)],
            iconos[Math.floor(Math.random() * iconos.length)],
            iconos[Math.floor(Math.random() * iconos.length)]
        ];
        
        document.getElementById('s1').innerText = res[0];
        document.getElementById('s2').innerText = res[1];
        document.getElementById('s3').innerText = res[2];
        
        count++;
        if (count > 20) {
            clearInterval(interval);
            btn.disabled = false;
            validarResultado(res);
        }
    }, 50);
}

function validarResultado(res) {
    // CORRECCIÓN SOLICITADA: 
    // Ahora usamos && para asegurar que los TRES sean iguales.
    if (res[0] === res[1] && res[1] === res[2]) {
        document.querySelectorAll('.slot-cell').forEach(c => c.classList.add('win-jackpot'));
        alert("¡FELICIDADES! Ganaste un 25% OFF");
    } else {
        // No hay premio si solo hay 2 iguales o ninguno
        console.log("Sigue intentando...");
    }
}
</script>

</body>
</html>
